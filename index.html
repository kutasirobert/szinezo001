<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Háztáji állatok</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Háztáji állatok">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-overlay {
            background: rgba(255, 255, 255, 0.20); 
            min-height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        #main-title {
            margin-top: 30px; margin-bottom: 20px;
            color: #2c3e50; font-size: 1.6rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; text-align: center;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 400px;
            box-sizing: border-box;
        }

        #start-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            width: 80%; max-width: 300px; transition: opacity 0.5s;
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        
        #canary-modal, #reset-modal {
            display: none;
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 350px;
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 2000; text-align: center;
        }
        #canary-text {
            background: #f8f9fa; padding: 15px; border-radius: 10px;
            font-style: italic; margin: 15px 0; border: 1px dashed #bdc3c7;
            word-wrap: break-word; color: #2c3e50;
            min-height: 40px;
        }

        input[type="text"] {
            width: 100%; padding: 15px; border: 2px solid #bdc3c7;
            border-radius: 10px; font-size: 1.2rem; text-align: center;
            box-sizing: border-box; margin-bottom: 20px; outline: none;
        }

        #start-btn, .action-btn {
            width: 100%; padding: 15px; background-color: #2ecc71;
            color: white; border: none; border-radius: 10px;
            font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-bottom: 10px;
        }
        .cancel-btn { background-color: #e74c3c; }
        .grey-btn { background-color: #95a5a6; }

        #msg { margin-top: 15px; font-weight: bold; font-size: 0.9rem; }

        #content-area {
            display: none; width: 90%; max-width: 600px;
            padding-bottom: 50px; z-index: 5;
        }

        .list-item {
            background: white; margin-bottom: 10px; padding: 15px;
            border-radius: 8px; border-left: 5px solid #3498db;
            cursor: pointer; font-weight: bold; transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #detail-view {
            display: none; width: 100%; line-height: 1.6; color: #34495e;
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        #text-body { white-space: pre-wrap; font-size: 1.1rem; margin-bottom: 20px; }

        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

        .back-btn { padding: 10px 20px; background: #34495e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .speak-btn { padding: 10px 20px; background: #f1c40f; color: #2c3e50; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .stop-btn { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; }

        #fs-button { position: fixed; top: 1px; right: 1px; background-color: rgba(255, 255, 255, 0.8); color: #7f8c8d; border: 1px solid #bdc3c7; padding: 5px 10px; border-radius: 5px; font-size: 0.6rem; z-index: 100; }
        #reset-btn { position: fixed; top: 1px; left: 1px; background-color: rgba(255, 255, 255, 0.8); color: #e74c3c; border: 1px solid #e74c3c; padding: 5px 10px; border-radius: 5px; font-size: 0.6rem; z-index: 100; cursor: pointer; }
        
        #install-panel { position: fixed; right: 0; top: 50%; transform: translateY(-50%) translateX(100%); display: none; align-items: center; z-index: 1000; transition: transform 0.4s; }
        #install-panel.visible { display: flex; transform: translateY(-50%) translateX(0); }
        #install-panel.collapsed { transform: translateY(-50%) translateX(calc(100% - 40px)); }
        #install-content { background: #3498db; color: white; padding: 15px; border-radius: 15px 0 0 15px; }
        #toggle-btn { background: #2980b9; color: white; border: none; width: 40px; height: 60px; border-radius: 10px 0 0 10px; }
    </style>
</head>
<body>

    <div class="glass-overlay">
        <h1 id="main-title">Háztáji állatok</h1>

        <div id="start-container">
            <input type="text" id="activation-input" placeholder="Kód beírása..." maxlength="20">
            <button id="start-btn" onclick="_0x4a21()">Kezdés</button>
            <p id="msg"></p>
        </div>

        <div id="canary-modal">
            <h3 style="margin-top: 0;">Ellenőrzés</h3>
            <p style="font-size: 0.9rem;">Ha ez a szöveg hibátlan, a kód helyes:</p>
            <div id="canary-text">...</div>
            <button class="action-btn" onclick="_0x_confirm_access()">Rendben, olvasható</button>
            <button class="action-btn cancel-btn" onclick="_0x_close_modal()">Mégse / Rossz kód</button>
        </div>

        <div id="reset-modal">
            <h3 style="margin-top: 0; color: #e74c3c;">Vigyázat!</h3>
            <p style="font-size: 0.9rem;">Biztosan új kódot akarsz megadni? Ez kiléptet a jelenlegi munkamenetből.</p>
            <button class="action-btn cancel-btn" onclick="_0x_execute_reset()">Igen, új kód</button>
            <button class="action-btn grey-btn" onclick="_0x_close_reset_modal()">Mégse</button>
        </div>

        <div id="content-area">
            <div id="list-view"></div>
            <div id="detail-view">
                <div class="btn-row">
                    <button class="back-btn" onclick="_0x_back()">← Vissza</button>
                    <button class="speak-btn" onclick="_0x_speak()">🔊 FELOLVASÁS</button>
                    <button class="stop-btn" onclick="_0x_stop()">🛑 STOP</button>
                </div>
                <div id="text-body"></div>
            </div>
        </div>
    </div>

    <button id="reset-btn" onclick="_0x_prompt_reset()">ÚJ KÓD</button>
    <button id="fs-button" onclick="toggleFullScreen()">TELJES KÉPERNYŐ</button>

    <div id="install-panel">
        <button id="toggle-btn" onclick="togglePanel()">‹</button>
        <div id="install-content">
            <span style="font-size: 0.7rem; font-weight: bold;">TELEPÍTÉS</span><br>
            <button onclick="pwaInstall()" style="margin-top:5px; font-size:0.7rem;">OK</button>
        </div>
    </div>
