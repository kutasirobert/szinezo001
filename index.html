        .back-btn {
            padding: 10px 20px; background: #34495e; color: white;

        }

        .speak-btn {
            padding: 10px 20px; background: #f1c40f; color: #2c3e50; 
            border: none; border-radius: 5px; cursor: pointer; font-size: 0.9rem;
            font-weight: bold;
        }

        .stop-btn {
            padding: 10px 20px; background: #e74c3c; color: white; 
            border: none; border-radius: 5px; cursor: pointer; font-size: 0.9rem;
        }

        #fs-button {
            position: fixed; top: 10px; right: 10px;
            background-color: rgba(255, 255, 255, 0.8); color: #7f8c8d;
            border: 1px solid #bdc3c7; padding: 5px 10px; border-radius: 5px;
            font-size: 0.6rem; z-index: 100;
        }

        #install-panel {
            position: fixed; right: 0; top: 50%;
            transform: translateY(-50%) translateX(100%);
            display: none; align-items: center; z-index: 1000;
            transition: transform 0.4s;
        }
        #install-panel.visible { display: flex; transform: translateY(-50%) translateX(0); }
        #install-panel.collapsed { transform: translateY(-50%) translateX(calc(100% - 40px)); }
        #install-content { background: #3498db; color: white; padding: 15px; border-radius: 15px 0 0 15px; }
        #toggle-btn { background: #2980b9; color: white; border: none; width: 40px; height: 60px; border-radius: 10px 0 0 10px; }
    </style>
</head>
