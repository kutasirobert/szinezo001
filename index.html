<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Háztáji állatok</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-overlay {
            background: rgba(255, 255, 255, 0.20); 
            min-height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        #main-title {
            margin-top: 30px; margin-bottom: 20px;
            color: #2c3e50; font-size: 1.6rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; text-align: center;
        }

        #start-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            width: 80%; max-width: 300px; transition: opacity 0.5s;
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            width: 100%; padding: 15px; border: 2px solid #bdc3c7;
            border-radius: 10px; font-size: 1.2rem; text-align: center;
            box-sizing: border-box; margin-bottom: 20px; outline: none;
        }

        #start-btn {
            width: 100%; padding: 15px; background-color: #2ecc71;
            color: white; border: none; border-radius: 10px;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }

        #msg { margin-top: 15px; font-weight: bold; font-size: 0.9rem; }

        #content-area {
            display: none; width: 90%; max-width: 600px;
            padding-bottom: 50px; z-index: 5;
        }

        .list-item {
            background: white; margin-bottom: 10px; padding: 15px;
            border-radius: 8px; border-left: 5px solid #3498db;
            cursor: pointer; font-weight: bold; transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .list-item:active { transform: scale(0.98); }

        #detail-view {
            display: none; width: 100%; line-height: 1.6; color: #34495e;
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        #text-body { white-space: pre-wrap; font-size: 1.1rem; margin-bottom: 20px; }

        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

        .back-btn {
            padding: 10px 20px; background: #34495e; color: white; 
            border: none; border-radius: 5px; cursor: pointer; font-size: 0.9rem;
        }

        .speak-btn {
            padding: 10px 20px; background: #f1c40f; color: #2c3e50; 
            border: none; border-radius: 5px; cursor: pointer; font-size: 0.9rem;
            font-weight: bold;
        }

        .stop-btn {
            padding: 10px 20px; background: #e74c3c; color: white; 
            border: none; border-radius: 5px; cursor: pointer; font-size: 0.9rem;
        }

        #fs-button {
            position: fixed; top: 1px; right: 1px;
            background-color: rgba(255, 255, 255, 0.8); color: #7f8c8d;
            border: 1px solid #bdc3c7; padding: 5px 10px; border-radius: 5px;
            font-size: 0.6rem; z-index: 100;
        }

        #install-panel {
            position: fixed; right: 0; top: 50%;
            transform: translateY(-50%) translateX(100%);
            display: none; align-items: center; z-index: 1000;
            transition: transform 0.4s;
        }
        #install-panel.visible { display: flex; transform: translateY(-50%) translateX(0); }
        #install-panel.collapsed { transform: translateY(-50%) translateX(calc(100% - 40px)); }
        #install-content { background: #3498db; color: white; padding: 15px; border-radius: 15px 0 0 15px; }
        #toggle-btn { background: #2980b9; color: white; border: none; width: 40px; height: 60px; border-radius: 10px 0 0 10px; }
    </style>
</head>

        <div id="start-container">

            <p id="msg"></p>
        </div>

        <div id="content-area">
            <div id="list-view"></div>
            <div id="detail-view">
                <div class="btn-row">
                    <button class="back-btn" onclick="_0x_back()">← Vissza</button>
                    <button class="speak-btn" onclick="_0x_speak()">🔊 FELOLVASÁS</button>
                    <button class="stop-btn" onclick="_0x_stop()">🛑 STOP</button>
                </div>
                <div id="text-body"></div>
            </div>
        </div>
    </div>

    <button id="fs-button" onclick="toggleFullScreen()">TELJES KÉPERNYŐ</button>

    <div id="install-panel">

            <button onclick="pwaInstall()" style="margin-top:5px; font-size:0.7rem;">OK</button>
        </div>
    </div>
